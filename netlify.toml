# ── Netlify Deploy Yapılandırması ─────────────────────────────────────────────
# @netlify/plugin-nextjs tüm Next.js özelliklerini (SSR, ISR, Edge, Image Opt.)
# otomatik yönetir. Manuel [functions] veya publish path tanımlamak gerekmez.

[build]
  command = "npm run build"
  # publish = ".next"  ← plugin-nextjs ile bu satır olmamalı, plugin kendisi yönetir

[build.environment]
  NODE_VERSION    = "20"
  NPM_FLAGS       = "--legacy-peer-deps"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Cache: Statik varlıklar ────────────────────────────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/grid-imgs/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
